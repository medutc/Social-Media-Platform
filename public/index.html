<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-section" class="screen active">
        <div class="glass-card auth-card">
            <h1>Join the Network</h1>
            <p>Enter a username to start connecting.</p>
            <input type="text" id="username-input" placeholder="e.g., moataz_dev">
            <button id="login-btn" class="primary-btn">Enter</button>
            <div id="auth-error" class="error-text"></div>
        </div>
    </div>

    <div id="app-section" class="screen hidden">
        <nav class="glass-nav">
            <div class="logo">Oasis.</div>
            <div class="user-badge" id="current-user-display">Loading...</div>
        </nav>

        <main class="dashboard-grid">
            
            <aside class="sidebar glass-card">
                <h3>Discover Users</h3>
                <div id="users-list" class="scrollable-list">
                    </div>
            </aside>

            <section class="feed">
                <div class="glass-card create-post">
                    <textarea id="post-content" placeholder="What's on your mind?"></textarea>
                    <button id="post-btn" class="primary-btn">Publish</button>
                </div>

                <div id="posts-container">
                    </div>
            </section>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
